name: Build and Release go-http-file-server

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch, tag or commit to build from
        required: true
        default: main

env:
  SOURCE_REPO: mjpclab/go-http-file-server

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v7
        with:
          persist-credentials: false
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ github.event.inputs.branch }}
          fetch-depth: 0

      - name: Set up Go
        id: setup-go
        uses: actions/setup-go@v7
        with:
          go-version: stable
          cache: false

      - name: Cache Go build
        uses: actions/cache@v6
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-gobuild-${{ steps.setup-go.outputs.go-version }}-${{ github.event.inputs.branch }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-gobuild-${{ steps.setup-go.outputs.go-version }}-${{ github.event.inputs.branch }}-
            ${{ runner.os }}-gobuild-${{ steps.setup-go.outputs.go-version }}-

      - name: Get version
        id: get_version
        run: |
          source build/build.inc.version.sh
          VERSION="${VERSION:-${{ github.event.inputs.branch }}}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build
        run: bash build/build-all.sh

      - name: Build Linux packages (.deb, .rpm, Arch & apk)
        env:
          NFPM_VERSION: latest
          VERSION: ${{ steps.get_version.outputs.version }}
        run: |
          set -euo pipefail

          # nfpm turns a binary into .deb/.rpm from one config, no dpkg/rpmbuild
          # needed. Install it with the Go toolchain already set up above.
          go install "github.com/goreleaser/nfpm/v2/cmd/nfpm@${NFPM_VERSION}"
          NFPM="$(go env GOPATH)/bin/nfpm"

          # This workflow checks out the *upstream* repo, not this one, so the
          # packaging config isn't on disk — write it inline. ${PKG_ARCH} and
          # ${PKG_VERSION} are expanded by nfpm from the environment per-arch.
          cat > nfpm.yaml <<'EOF'
          name: ghfs
          arch: ${PKG_ARCH}
          version: ${VERSION}
          version_schema: none
          maintainer: MJ PC Lab
          description: Simple command line based HTTP file server to share local file system.
          homepage: "https://github.com/${{ env.SOURCE_REPO }}"
          license: MIT
          section: net
          priority: optional
          contents:
            - src: pkgroot/ghfs
              dst: /usr/bin/ghfs
          EOF

          # Extract the linux binary from each per-arch archive and package it.
          mkdir -p pkgroot
          for arch in amd64 arm64; do
            archive="output/ghfs-${VERSION}-linux-${arch}.tar.gz"
            if [ ! -f "$archive" ]; then
              echo "::warning::${archive} not found, skipping ${arch} packages"
              continue
            fi
            rm -f pkgroot/ghfs
            tar -xzf "$archive" -C pkgroot ghfs
            chmod 0755 pkgroot/ghfs
            export PKG_ARCH="$arch"
            "$NFPM" package -f nfpm.yaml -p deb -t output/
            "$NFPM" package -f nfpm.yaml -p rpm -t output/
            "$NFPM" package -f nfpm.yaml -p archlinux -t output/
            "$NFPM" package -f nfpm.yaml -p apk -t output/
          done

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          VERSION="v${{ steps.get_version.outputs.version }}"
          NOTES="* Source repo: ${SOURCE_REPO}"$'\n'"* Source branch: \`${{ github.event.inputs.branch }}\`"
          gh release delete "${VERSION}" --yes --cleanup-tag 2>/dev/null || true
          gh release create "${VERSION}" output/* \
            --title "go-http-file-server ${VERSION}" \
            --notes "${NOTES}" \
            --target ${{ github.ref_name }} \
            --prerelease
